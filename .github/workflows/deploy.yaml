name: AWS App Runner deploy

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

env:
    AWS_REGION: eu-west-1
    ECR_REPOSITORY: tavern-ai
    APP_RUNNER_SERVICE_ARN: ${{ secrets.APP_RUNNER_SERVICE_ARN }}

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install dependencies
              run: uv sync --group dev

            - name: Ruff check
              run: uv run ruff check .

            - name: Ruff format check
              run: uv run ruff format --check .

    deploy:
        name: Build and Deploy
        runs-on: ubuntu-latest
        needs: lint
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        steps:
            - uses: actions/checkout@v6

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v6
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build, tag and push image to ECR
              id: build-image
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  IMAGE_TAG: ${{ github.sha }}
              run: |
                  docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
                  docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
                  docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                  docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

            - name: Deploy to App Runner
              run: |
                  aws apprunner update-service \
                    --service-arn ${{ env.APP_RUNNER_SERVICE_ARN }} \
                    --source-configuration '{
                      "ImageRepository": {
                        "ImageIdentifier": "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}",
                        "ImageRepositoryType": "ECR"
                      }
                    }'
